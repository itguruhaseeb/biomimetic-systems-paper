<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="480" fill="#ffffff"/>
  <text x="40" y="44" font-size="23" font-weight="bold" fill="#1a2b34">Figure 4: Homeostatic regulation mapped to a systems control loop</text>

  <defs>
    <marker id="arrTeal4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#17627a"/>
    </marker>
  </defs>

  <!-- Setpoint box (gold) -->
  <rect x="30" y="130" width="160" height="80" rx="8" fill="#eef3f5" stroke="#c8922e" stroke-width="3"/>
  <text x="110" y="160" font-size="13" fill="#1a2b34" text-anchor="middle">Setpoint</text>
  <text x="110" y="179" font-size="12" fill="#1a2b34" text-anchor="middle">(target latency /</text>
  <text x="110" y="196" font-size="12" fill="#1a2b34" text-anchor="middle">utilization)</text>

  <!-- Summing junction -->
  <circle cx="270" cy="170" r="26" fill="#ffffff" stroke="#1a2b34" stroke-width="2"/>
  <text x="256" y="162" font-size="15" fill="#1a2b34" text-anchor="middle">+</text>
  <text x="272" y="200" font-size="15" fill="#1a2b34" text-anchor="middle">-</text>

  <!-- Controller box -->
  <rect x="360" y="130" width="170" height="80" rx="8" fill="#eef3f5" stroke="#17627a" stroke-width="2"/>
  <text x="445" y="164" font-size="14" fill="#1a2b34" text-anchor="middle">Controller</text>
  <text x="445" y="184" font-size="12" fill="#1a2b34" text-anchor="middle">(autoscaler / rate limiter)</text>

  <!-- Plant box -->
  <rect x="630" y="130" width="170" height="80" rx="8" fill="#eef3f5" stroke="#17627a" stroke-width="2"/>
  <text x="715" y="164" font-size="14" fill="#1a2b34" text-anchor="middle">Plant</text>
  <text x="715" y="184" font-size="12" fill="#1a2b34" text-anchor="middle">(service under load)</text>

  <!-- Sensor box (feedback path, lower right) -->
  <rect x="630" y="320" width="170" height="70" rx="8" fill="#ffffff" stroke="#17627a" stroke-width="2"/>
  <text x="715" y="352" font-size="14" fill="#1a2b34" text-anchor="middle">Sensor</text>
  <text x="715" y="372" font-size="12" fill="#1a2b34" text-anchor="middle">(metrics)</text>

  <!-- Forward loop arrows (teal) -->
  <line x1="190" y1="170" x2="242" y2="170" stroke="#17627a" stroke-width="2.5" marker-end="url(#arrTeal4)"/>
  <line x1="296" y1="170" x2="358" y2="170" stroke="#17627a" stroke-width="2.5" marker-end="url(#arrTeal4)"/>
  <line x1="530" y1="170" x2="628" y2="170" stroke="#17627a" stroke-width="2.5" marker-end="url(#arrTeal4)"/>

  <!-- Plant -> Sensor (down) -->
  <path d="M 715,210 L 715,318" fill="none" stroke="#17627a" stroke-width="2.5" marker-end="url(#arrTeal4)"/>

  <!-- Sensor -> summing junction negative input (feedback) -->
  <path d="M 630,355 L 270,355 L 270,198" fill="none" stroke="#17627a" stroke-width="2.5" marker-end="url(#arrTeal4)"/>
  <text x="450" y="345" font-size="12" fill="#7a8a90" text-anchor="middle">measured feedback (negative)</text>

  <!-- Annotation box -->
  <rect x="30" y="400" width="560" height="66" rx="8" fill="#eef3f5" stroke="#7a8a90" stroke-width="1"/>
  <text x="46" y="426" font-size="13" fill="#1a2b34">Biology: allostasis anticipates load before the setpoint is breached;</text>
  <text x="46" y="448" font-size="13" fill="#1a2b34">the engineering analogue is predictive autoscaling.</text>
</svg>
